<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Corner</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 220px;
      --sidebar-bg: #1e2a38;
      --sidebar-hover: #2c3e50;
      --accent: #4a9eff;
      --accent-dim: rgba(74, 158, 255, 0.15);
      --text: #2c3e50;
      --text-light: #6b7280;
      --border: #e5e7eb;
      --bg: #f9fafb;
      --surface: #ffffff;
      --radius: 8px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    /* ── Mobile header ── */
    .mobile-header {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--sidebar-bg);
      color: #fff;
    }
    .mobile-header h1 { font-size: 1rem; flex: 1; }
    .mobile-header select {
      background: var(--sidebar-hover);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-title {
      padding: 24px 20px 8px;
      color: rgba(255,255,255,0.5);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .sidebar-brand {
      padding: 20px 20px 4px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .date-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px 20px;
    }
    .date-list::-webkit-scrollbar { width: 4px; }
    .date-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .date-item {
      display: block;
      padding: 9px 12px;
      border-radius: var(--radius);
      color: rgba(255,255,255,0.75);
      font-size: 0.88rem;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .date-item:hover { background: var(--sidebar-hover); color: #fff; }
    .date-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 600;
    }
    .date-item .label { display: block; }
    .date-item .sub {
      font-size: 0.75rem;
      opacity: 0.6;
      margin-top: 1px;
    }

    /* ── Main content ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 40px 48px;
      max-width: 820px;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: var(--text-light);
      gap: 12px;
    }
    .placeholder svg { opacity: 0.3; }
    .placeholder p { font-size: 0.95rem; }

    /* ── Markdown styles ── */
    .md h1 { font-size: 1.6rem; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
    .md h2 { font-size: 1.25rem; margin: 32px 0 12px; }
    .md h3 { font-size: 1.05rem; margin: 24px 0 8px; }
    .md p { line-height: 1.8; margin-bottom: 14px; }
    .md ul, .md ol { padding-left: 1.5em; margin-bottom: 14px; }
    .md li { line-height: 1.75; margin-bottom: 4px; }
    .md blockquote {
      border-left: 3px solid var(--accent);
      margin: 16px 0;
      padding: 10px 18px;
      background: var(--accent-dim);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-light);
      font-size: 0.92rem;
    }
    .md code {
      background: #f1f5f9;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.85em;
      font-family: "Cascadia Code", "Fira Code", monospace;
    }
    .md pre {
      background: #1e2a38;
      color: #e2e8f0;
      border-radius: var(--radius);
      padding: 16px 20px;
      overflow-x: auto;
      margin-bottom: 16px;
    }
    .md pre code { background: none; padding: 0; color: inherit; }
    .md strong { color: #1a202c; }
    .md table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 0.9rem; }
    .md th, .md td { padding: 10px 14px; border: 1px solid var(--border); text-align: left; }
    .md th { background: var(--bg); font-weight: 600; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      aside { display: none; }
      .mobile-header { display: flex; }
      main { padding: 24px 20px; max-width: 100%; }
    }
  </style>
</head>
<body>

  <div class="mobile-header">
    <h1>English Corner</h1>
    <select id="mobileSelect" onchange="loadDate(this.value)">
      <option value="">選擇日期</option>
    </select>
  </div>

  <div class="layout">
    <aside>
      <div class="sidebar-brand">English Corner</div>
      <div class="sidebar-title">學習記錄</div>
      <nav class="date-list" id="dateList"></nav>
    </aside>

    <main id="main">
      <div class="placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <p>從左側選擇日期，開始複習 English Corner</p>
      </div>
    </main>
  </div>

  <script>
    function formatDateLabel(dateStr) {
      const y = dateStr.slice(0, 4);
      const m = dateStr.slice(4, 6);
      const d = dateStr.slice(6, 8);
      const date = new Date(`${y}-${m}-${d}`);
      const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      return {
        main: `${y}/${m}/${d}`,
        sub: weekdays[date.getDay()],
      };
    }

    async function loadDate(dateStr) {
      if (!dateStr) return;

      // Update active state in sidebar
      document.querySelectorAll('.date-item').forEach(el => {
        el.classList.toggle('active', el.dataset.date === dateStr);
      });
      const mobileSelect = document.getElementById('mobileSelect');
      if (mobileSelect.value !== dateStr) mobileSelect.value = dateStr;

      const main = document.getElementById('main');
      main.innerHTML = '<div class="placeholder"><p>載入中...</p></div>';

      try {
        const res = await fetch(`src/English_${dateStr}.md`);
        if (!res.ok) throw new Error('Not found');
        const text = await res.text();
        const div = document.createElement('div');
        div.className = 'md';
        div.innerHTML = marked.parse(text);
        main.innerHTML = '';
        main.appendChild(div);
        main.scrollTop = 0;
      } catch {
        main.innerHTML = '<div class="placeholder"><p>無法載入此日期的內容。</p></div>';
      }
    }

    async function init() {
      try {
        const res = await fetch('src/index.json');
        if (!res.ok) throw new Error();
        const { dates } = await res.json();

        const list = document.getElementById('dateList');
        const sel = document.getElementById('mobileSelect');

        dates.forEach(dateStr => {
          const { main, sub } = formatDateLabel(dateStr);

          const btn = document.createElement('button');
          btn.className = 'date-item';
          btn.dataset.date = dateStr;
          btn.innerHTML = `<span class="label">${main}</span><span class="sub">${sub}</span>`;
          btn.onclick = () => loadDate(dateStr);
          list.appendChild(btn);

          const opt = document.createElement('option');
          opt.value = dateStr;
          opt.textContent = main;
          sel.appendChild(opt);
        });

        if (dates.length > 0) loadDate(dates[0]);
      } catch {
        document.getElementById('main').innerHTML =
          '<div class="placeholder"><p>找不到 src/index.json，請確認設定是否正確。</p></div>';
      }
    }

    init();
  </script>
</body>
</html>
