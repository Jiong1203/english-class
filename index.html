<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Corner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 260px;
      --sidebar-bg: #0f172a;
      --sidebar-surface: #1e293b;
      --sidebar-hover: #334155;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-dim: rgba(99, 102, 241, 0.12);
      --accent-glow: rgba(99, 102, 241, 0.25);
      --text: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --border-subtle: #f1f5f9;
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-raised: #ffffff;
      --code-bg: #f1f5f9;
      --code-color: #6366f1;
      --strong-color: #1a202c;
      --radius: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
      --theme-transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
    }

    /* ── Dark theme overrides ── */
    [data-theme="dark"] {
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #2d3748;
      --border-subtle: #1e293b;
      --bg: #0d1117;
      --surface: #161b22;
      --surface-raised: #1e2530;
      --code-bg: #1e2530;
      --code-color: #a5b4fc;
      --strong-color: #f1f5f9;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
      --shadow: 0 4px 16px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.2);
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      transition: var(--theme-transition);
    }

    /* ── Mobile header ── */
    .mobile-header {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--sidebar-bg);
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .mobile-header h1 {
      font-size: 0.95rem;
      font-weight: 600;
      flex: 1;
      letter-spacing: -0.01em;
    }
    .mobile-header select {
      background: var(--sidebar-surface);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 7px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: 100%;
    }

    /* ── Sidebar ── */
    aside {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      border-right: 1px solid rgba(255,255,255,0.04);
    }

    .sidebar-header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
      stroke: white;
    }

    .brand-text {
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-sub {
      color: rgba(255,255,255,0.35);
      font-size: 0.72rem;
      margin-top: 2px;
      letter-spacing: 0.04em;
    }

    .sidebar-section-title {
      padding: 20px 20px 8px;
      color: rgba(255,255,255,0.3);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .date-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 20px;
    }
    .date-list::-webkit-scrollbar { width: 3px; }
    .date-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
    }
    .date-list::-webkit-scrollbar-track { background: transparent; }

    .date-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius);
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }
    .date-item:hover {
      background: var(--sidebar-hover);
      color: rgba(255,255,255,0.9);
    }
    .date-item.active {
      background: var(--accent-dim);
      color: var(--accent-light);
    }
    .date-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .date-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .date-item.active .date-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }

    .date-info { flex: 1; min-width: 0; }
    .date-item .label {
      display: block;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .date-item .sub {
      font-size: 0.72rem;
      opacity: 0.5;
      margin-top: 1px;
    }

    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .entry-count {
      color: rgba(255,255,255,0.3);
      font-size: 0.72rem;
      letter-spacing: 0.04em;
    }

    /* ── Theme toggle button ── */
    .theme-toggle {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.9);
      border-color: rgba(255,255,255,0.2);
    }
    .theme-toggle svg { width: 15px; height: 15px; }
    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
    [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

    /* ── Main content ── */
    main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      transition: var(--theme-transition);
    }

    main::-webkit-scrollbar { width: 6px; }
    main::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    main::-webkit-scrollbar-track { background: transparent; }

    .main-inner {
      flex: 1;
      padding: 48px 64px;
      max-width: 100%;
      width: 100%;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 60vh;
      color: var(--text-muted);
      gap: 16px;
    }

    .placeholder-icon {
      width: 64px;
      height: 64px;
      background: var(--border-subtle);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder-icon svg {
      opacity: 0.4;
      width: 28px;
      height: 28px;
    }

    .placeholder h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .placeholder p {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* ── Top bar inside main ── */
    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 64px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
      transition: var(--theme-transition);
    }

    .content-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .content-date-badge {
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: -0.01em;
    }

    /* ── Markdown styles ── */
    .md {
      line-height: 1.7;
    }

    .md h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1.3;
    }

    .md h1 + blockquote {
      margin-top: 0;
      margin-bottom: 32px;
    }

    .md h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 40px 0 14px;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .md h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 1em;
      background: linear-gradient(180deg, var(--accent), var(--accent-light));
      border-radius: 2px;
      flex-shrink: 0;
    }

    .md h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 28px 0 10px;
      color: var(--text);
    }

    .md p {
      line-height: 1.85;
      margin-bottom: 16px;
      color: var(--text);
    }

    .md ul, .md ol {
      padding-left: 1.6em;
      margin-bottom: 16px;
    }

    .md li {
      line-height: 1.8;
      margin-bottom: 6px;
      color: var(--text);
    }

    .md blockquote {
      border-left: 3px solid var(--accent);
      margin: 20px 0;
      padding: 14px 20px;
      background: var(--accent-dim);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .md blockquote p { margin-bottom: 0; color: var(--text-secondary); }

    .md code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 7px;
      font-size: 0.82em;
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
      color: var(--code-color);
    }

    .md pre {
      background: var(--sidebar-bg);
      color: #e2e8f0;
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      overflow-x: auto;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: var(--shadow);
    }

    .md pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      font-size: 0.875em;
    }

    .md strong {
      font-weight: 600;
      color: var(--strong-color);
    }

    .md em {
      color: var(--text-secondary);
    }

    .md table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      font-size: 0.875rem;
      box-shadow: var(--shadow-sm);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .md th, .md td {
      padding: 12px 16px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .md th {
      background: var(--bg);
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .md tr:hover td { background: var(--border-subtle); }

    .md hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
      margin: 36px 0;
    }

    .md a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent-dim);
      transition: border-color 0.15s;
    }
    .md a:hover { border-color: var(--accent); }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* fade in */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .md { animation: fadeIn 0.25s ease; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      aside { display: none; }
      .mobile-header { display: flex; }
      .content-header { padding: 16px 20px; }
      .main-inner { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="mobile-header">
    <h1>✦ English Corner</h1>
    <select id="mobileSelect" onchange="loadDate(this.value)">
      <option value="">選擇日期</option>
    </select>
  </div>

  <div class="layout">
    <aside>
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
          </div>
          <div>
            <div class="brand-text">English Corner</div>
            <div class="brand-sub">學習記錄存檔</div>
          </div>
        </div>
      </div>

      <div class="sidebar-section-title">學習記錄</div>
      <nav class="date-list" id="dateList"></nav>

      <div class="sidebar-footer">
        <div class="entry-count" id="entryCount">載入中…</div>
        <button class="theme-toggle" id="themeToggle" title="切換主題">
          <!-- Sun icon (shown in dark mode) -->
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <!-- Moon icon (shown in light mode) -->
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </aside>

    <main id="main">
      <div class="placeholder">
        <div class="placeholder-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
        </div>
        <h3>選擇一個學習日期</h3>
        <p>從左側選擇日期，開始複習 English Corner 內容</p>
      </div>
    </main>
  </div>

  <script>
    function formatDateLabel(dateStr) {
      const y = dateStr.slice(0, 4);
      const m = dateStr.slice(4, 6);
      const d = dateStr.slice(6, 8);
      const date = new Date(`${y}-${m}-${d}`);
      const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      return {
        main: `${y}/${m}/${d}`,
        sub: weekdays[date.getDay()],
      };
    }

    async function loadDate(dateStr) {
      if (!dateStr) return;

      document.querySelectorAll('.date-item').forEach(el => {
        el.classList.toggle('active', el.dataset.date === dateStr);
      });
      const mobileSelect = document.getElementById('mobileSelect');
      if (mobileSelect.value !== dateStr) mobileSelect.value = dateStr;

      const main = document.getElementById('main');
      main.innerHTML = `
        <div class="placeholder">
          <div class="loading">
            <div class="spinner"></div>
            <span>載入中…</span>
          </div>
        </div>`;

      try {
        const res = await fetch(`src/English_${dateStr}.md`);
        if (!res.ok) throw new Error('Not found');
        const text = await res.text();

        const { y, m, d } = (() => {
          const y = dateStr.slice(0,4), m = dateStr.slice(4,6), d = dateStr.slice(6,8);
          return {y,m,d};
        })();
        const date = new Date(`${y}-${m}-${d}`);
        const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

        main.innerHTML = `
          <div class="content-header">
            <span class="content-title">${y}/${m}/${d} &nbsp;·&nbsp; ${weekdays[date.getDay()]}</span>
            <span class="content-date-badge">English Corner</span>
          </div>
          <div class="main-inner" id="mdContainer"></div>`;

        const div = document.createElement('div');
        div.className = 'md';
        div.innerHTML = marked.parse(text);
        document.getElementById('mdContainer').appendChild(div);
        main.scrollTop = 0;
      } catch {
        main.innerHTML = `
          <div class="placeholder">
            <div class="placeholder-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h3>無法載入內容</h3>
            <p>找不到此日期的學習記錄</p>
          </div>`;
      }
    }

    async function init() {
      try {
        const res = await fetch('src/index.json');
        if (!res.ok) throw new Error();
        const { dates } = await res.json();

        const list = document.getElementById('dateList');
        const sel = document.getElementById('mobileSelect');
        const countEl = document.getElementById('entryCount');

        dates.forEach(dateStr => {
          const { main, sub } = formatDateLabel(dateStr);

          const btn = document.createElement('button');
          btn.className = 'date-item';
          btn.dataset.date = dateStr;
          btn.innerHTML = `
            <div class="date-dot"></div>
            <div class="date-info">
              <span class="label">${main}</span>
              <span class="sub">${sub}</span>
            </div>`;
          btn.onclick = () => loadDate(dateStr);
          list.appendChild(btn);

          const opt = document.createElement('option');
          opt.value = dateStr;
          opt.textContent = main;
          sel.appendChild(opt);
        });

        countEl.textContent = `共 ${dates.length} 筆記錄`;

        if (dates.length > 0) loadDate(dates[dates.length - 1]);
      } catch {
        document.getElementById('main').innerHTML = `
          <div class="placeholder">
            <div class="placeholder-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h3>設定錯誤</h3>
            <p>找不到 src/index.json，請確認設定是否正確</p>
          </div>`;
      }
    }

    // ── Theme toggle ──
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('ec-theme', theme);
    }

    function initTheme() {
      const saved = localStorage.getItem('ec-theme');
      if (saved) {
        applyTheme(saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        applyTheme('dark');
      } else {
        applyTheme('light');
      }
    }

    themeToggle.addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'dark';
      applyTheme(isDark ? 'light' : 'dark');
    });

    initTheme();
    init();
  </script>
</body>
</html>
